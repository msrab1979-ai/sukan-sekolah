<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Sukan Tahunan</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background-color: #f9fafb; }
    .role-card { transition: all 0.3s ease; }
    .role-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.15); }
    .gradient-admin { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .spinner {
      border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%;
      width: 20px; height: 20px; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
  
  <div class="max-w-md w-full">
    <div class="text-center mb-8">
      <div class="text-6xl mb-4">🔐</div>
      <h1 class="text-3xl font-bold text-gray-900 mb-2">Log Masuk</h1>
      <p class="text-gray-600">Sistem Sukan Sekolah</p>
    </div>
    
    <div class="role-card bg-white rounded-2xl shadow-xl p-8">
      <div id="error-alert" class="hidden mb-6 p-4 bg-red-50 border-l-4 border-red-500 rounded text-red-700 font-medium"></div>
      
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="mb-6">
          <label for="username" class="block text-sm font-semibold text-gray-700 mb-2">Nama Pengguna</label>
          <input type="text" id="username" class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-blue-500 focus:outline-none" required>
        </div>
        
        <div class="mb-6">
          <label for="password" class="block text-sm font-semibold text-gray-700 mb-2">Kata Laluan</label>
          <input type="password" id="password" class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-blue-500 focus:outline-none" required>
        </div>
        
        <button type="submit" id="submit-btn" class="w-full py-3 px-4 rounded-lg font-semibold text-white gradient-admin flex items-center justify-center">
          <span id="btn-text">🔓 Log Masuk</span>
          <div id="btn-spinner" class="spinner hidden ml-2"></div>
        </button>
      </form>
      
      <div class="mt-6 text-center" id="back-container">
        <!-- Pautan dibina secara dinamik -->
        <a id="back-link" href="#" class="text-sm text-gray-600 hover:text-blue-600 transition-colors">← Kembali ke Laman Utama</a>
      </div>
    </div>
  </div>

  <script>
    let SCRIPT_URL = '';

    document.addEventListener('DOMContentLoaded', () => {
      // Dapatkan URL sistem awal-awal (on load) bagi mengelak ralat tak segerak (async block)
      if (typeof google !== 'undefined' && google.script) {
        google.script.run
          .withSuccessHandler((url) => {
            SCRIPT_URL = url;
            document.getElementById('back-link').href = SCRIPT_URL + '?page=home';
            document.getElementById('back-link').target = '_top';
          })
          .getScriptUrl();
      }
    });

    function handleLogin(event) {
      event.preventDefault();
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value;
      
      if (!user || !pass) return;

      document.getElementById('submit-btn').disabled = true;
      document.getElementById('btn-text').textContent = 'Mengesahkan...';
      document.getElementById('btn-spinner').classList.remove('hidden');
      document.getElementById('error-alert').classList.add('hidden');

      if (typeof google === 'undefined') {
        setTimeout(() => handleLoginSuccess({ role: 'Admin' }), 1000);
        return;
      }

      google.script.run
        .withSuccessHandler(function(response) {
          if (response.success) {
            handleLoginSuccess(response.session);
          } else {
            showError(response.message || 'Log masuk gagal.');
          }
        })
        .withFailureHandler(function(error) {
          showError('Ralat pelayan: ' + error.message);
        })
        .handleLogin({ username: user, password: pass });
    }

    function handleLoginSuccess(session) {
      const role = session.role || 'Admin';
      const redirectPage = (role === 'Admin') ? 'admin-setup' : 'pengurus';

      if (SCRIPT_URL) {
        // Bina pautan fizikal (real anchor) dengan target='_top'
        // Pengguna perlu klik ini untuk menyelesaikan navigasi tanpa dihalang Sandbox.
        const btn = document.getElementById('submit-btn');
        btn.outerHTML = `
          <a href="${SCRIPT_URL}?page=${redirectPage}" target="_top" class="w-full py-3 px-4 rounded-lg font-semibold text-white bg-green-600 hover:bg-green-700 flex items-center justify-center transition-all text-center no-underline">
            ✅ Log Masuk Berjaya! Klik untuk Teruskan
          </a>
        `;
        document.getElementById('error-alert').classList.add('hidden');
      } else {
        window.location.href = '?page=' + redirectPage;
      }
    }

    function showError(msg) {
      document.getElementById('submit-btn').disabled = false;
      document.getElementById('btn-text').textContent = '🔓 Log Masuk';
      document.getElementById('btn-spinner').classList.add('hidden');
      const err = document.getElementById('error-alert');
      err.textContent = msg;
      err.classList.remove('hidden');
    }
  </script>
</body>
</html>
