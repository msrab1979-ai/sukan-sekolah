<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sukan Tahunan - Home</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    
    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }
    
    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: bold;
    }
    
    .progress-bar {
      height: 24px;
      background: #e5e7eb;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }
    
    .progress-fill {
      height: 100%;
      transition: width 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 8px;
      color: white;
      font-weight: bold;
      font-size: 14px;
    }
    
    .skeleton {
      background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%);
      background-size: 200% 100%;
      animation: loading 1.5s infinite;
      border-radius: 4px;
    }
    
    @keyframes loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    
    .medal-icon {
      font-size: 24px;
      margin-right: 8px;
    }
    
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }
    
    @media (min-width: 768px) {
      .grid-2 {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    
    @media (min-width: 1024px) {
      .grid-4 {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
      }
    }
    
    .header {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 30px;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    
    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.3s;
    }
    
    .btn-primary {
      background: #3b82f6;
      color: white;
    }
    
    .btn-primary:hover {
      background: #2563eb;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
    }
    
    .error-message {
      background: #fee2e2;
      border: 2px solid #ef4444;
      color: #991b1b;
      padding: 16px;
      border-radius: 8px;
      margin: 20px 0;
    }
    
    .success-badge {
      background: #dcfce7;
      color: #166534;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  
  <!-- Header -->
  <div class="container">
    <div class="header">
      <h1 style="font-size: 32px; font-weight: bold; color: #1f2937; margin-bottom: 8px;">
        🏆 <span id="tournament-name">Loading...</span>
      </h1>
      <p style="color: #6b7280; font-size: 16px;">Sistem Pengurusan Sukan Tahunan</p>
      <div style="margin-top: 16px;">
       <button class="btn btn-primary" onclick="loginAs('admin')">
         🔐 Login Admin
        </button>
      </div>
    </div>
    
    <!-- Error Display -->
    <div id="error-container"></div>
    
    <!-- Loading State -->
    <div id="loading-state" style="display: none;">
      <div class="card">
        <div class="skeleton" style="height: 40px; width: 60%; margin-bottom: 16px;"></div>
        <div class="skeleton" style="height: 24px; width: 80%; margin-bottom: 12px;"></div>
        <div class="skeleton" style="height: 24px; width: 70%;"></div>
      </div>
    </div>
    
    <!-- Medal Tally -->
    <div class="card">
      <h2 style="font-size: 24px; font-weight: bold; color: #1f2937; margin-bottom: 20px;">
        🏅 Kedudukan Rumah
      </h2>
      <div id="medal-tally">
        <!-- Will be populated by JavaScript -->
      </div>
    </div>
    
    <!-- Best Athletes and Recent Results Grid -->
    <div class="grid-2">
      
      <!-- Best Athletes -->
      <div class="card">
        <h2 style="font-size: 20px; font-weight: bold; color: #1f2937; margin-bottom: 16px;">
          🌟 Murid Terbaik
        </h2>
        <div id="best-athletes">
          <!-- Will be populated by JavaScript -->
        </div>
      </div>
      
      <!-- Recent Results -->
      <div class="card">
        <h2 style="font-size: 20px; font-weight: bold; color: #1f2937; margin-bottom: 16px;">
          📊 Keputusan Terkini
        </h2>
        <div id="recent-results">
          <!-- Will be populated by JavaScript -->
        </div>
      </div>
      
    </div>
    
    <!-- Footer -->
    <div style="text-align: center; color: white; padding: 20px; margin-top: 40px;">
      <p style="font-size: 14px; opacity: 0.9;">
        © 2025 Athletics Tournament System | Auto-refresh setiap 30 saat
      </p>
      <p style="font-size: 12px; opacity: 0.7; margin-top: 8px;">
        Last updated: <span id="last-update">-</span>
      </p>
    </div>
    
  </div>
  
  <script>
    // Global state
    let dataCache = null;
    
    /**
     * Load data from backend
     */
    function loadData() {
      showLoading(true);
      hideError();
      
      google.script.run
        .withSuccessHandler(handleDataSuccess)
        .withFailureHandler(handleDataError)
        .getPublicData({ type: 'home' });
    }
    
    /**
     * Handle successful data load
     */
    function handleDataSuccess(response) {
      showLoading(false);
      
      if (!response.success) {
        showError(response.message || 'Gagal memuat data');
        return;
      }
      
      dataCache = response.data;
      
      // Update tournament name
       document.getElementById('tournament-name').textContent = 
         (dataCache.tournament && dataCache.tournament.name) || 'Sukan Tahunan 2025';
      
      // Display data
      displayMedalTally(dataCache.medalTally || []);
      displayBestAthletes(dataCache.bestAthletes || []);
      displayRecentResults(dataCache.recentResults || []);
      
      // Update timestamp
      document.getElementById('last-update').textContent = 
        new Date().toLocaleTimeString('ms-MY');
    }
    
    /**
     * Handle data load error
     */
    function handleDataError(error) {
      showLoading(false);
      showError('Gagal berhubung dengan server: ' + error.message);
      console.error('Load error:', error);
    }
    
    /**
     * Display medal tally
     */
    function displayMedalTally(tally) {
      const container = document.getElementById('medal-tally');
      
      if (!tally || tally.length === 0) {
        container.innerHTML = '<p style="color: #6b7280;">Tiada data kedudukan</p>';
        return;
      }
      
      let html = '';
      
      tally.forEach((house, index) => {
        const rank = index + 1;
        const maxPoints = tally[0].total_points || 1;
        const percentage = (house.total_points / maxPoints) * 100;
        
        html += `
          <div style="margin-bottom: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
              <div style="display: flex; align-items: center; gap: 12px;">
                <span style="font-size: 24px; font-weight: bold; color: #9ca3af;">#${rank}</span>
                <span class="badge" style="background: ${house.warna}; color: white;">
                  ${house.nama}
                </span>
              </div>
              <div style="text-align: right;">
                <div style="font-size: 20px; font-weight: bold; color: #1f2937;">
                  ${house.total_points} mata
                </div>
                <div style="font-size: 14px; color: #6b7280;">
                  <span class="medal-icon">🥇</span>${house.gold}
                  <span class="medal-icon">🥈</span>${house.silver}
                  <span class="medal-icon">🥉</span>${house.bronze}
                </div>
              </div>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" style="width: ${percentage}%; background: ${house.warna};">
                ${percentage.toFixed(0)}%
              </div>
            </div>
          </div>
        `;
      });
      
      container.innerHTML = html;
    }
    
    /**
     * Display best athletes
     */
    function displayBestAthletes(athletes) {
      const container = document.getElementById('best-athletes');
      
      if (!athletes || athletes.length === 0) {
        container.innerHTML = '<p style="color: #6b7280;">Tiada data murid terbaik</p>';
        return;
      }
      
      let html = '';
      
      athletes.forEach(athlete => {
        html += `
          <div style="padding: 16px; border: 2px solid #e5e7eb; border-radius: 8px; margin-bottom: 12px;">
            <div style="display: flex; justify-content: space-between; align-items: start;">
              <div style="flex: 1;">
                <div style="font-weight: bold; color: #1f2937; font-size: 16px;">
                  ${athlete.nama}
                </div>
                <div style="font-size: 12px; color: #6b7280; margin-top: 4px;">
                  Kategori ${athlete.kategori_kod || 'N/A'}
                </div>
                <div style="margin-top: 8px;">
                  <span style="font-size: 12px;">
                    🥇${athlete.total_gold} 🥈${athlete.total_silver} 🥉${athlete.total_bronze}
                  </span>
                </div>
              </div>
              <div style="text-align: right;">
                <div style="font-size: 18px; font-weight: bold; color: #3b82f6;">
                  ${athlete.total_points}
                </div>
                <div style="font-size: 12px; color: #6b7280;">mata</div>
              </div>
            </div>
          </div>
        `;
      });
      
      container.innerHTML = html;
    }
    
    /**
     * Display recent results
     */
    function displayRecentResults(results) {
      const container = document.getElementById('recent-results');
      
      if (!results || results.length === 0) {
        container.innerHTML = '<p style="color: #6b7280;">Tiada keputusan terkini</p>';
        return;
      }
      
      let html = '';
      
      results.slice(0, 10).forEach(result => {
        const eventName = result.event_name || result.no_acara || 'N/A';
        const winner = result.rank_1_nama || 'N/A';
        const time = result.rank_1_result ? formatResult(result.rank_1_result) : '-';
        const publishedDate = result.published_at ? 
          new Date(result.published_at).toLocaleDateString('ms-MY') : '-';
        
        html += `
          <div style="padding: 12px; border-left: 4px solid #3b82f6; background: #f9fafb; margin-bottom: 8px; border-radius: 4px;">
            <div style="font-weight: 600; color: #1f2937; margin-bottom: 4px;">
              ${eventName}
            </div>
            <div style="font-size: 14px; color: #6b7280;">
              🥇 ${winner} - ${time}
            </div>
            <div style="font-size: 12px; color: #9ca3af; margin-top: 4px;">
              ${publishedDate}
            </div>
          </div>
        `;
      });
      
      container.innerHTML = html;
    }
    
    /**
     * Format result (time/distance)
     */
    function formatResult(value) {
      if (!value) return '-';
      return parseFloat(value).toFixed(2);
    }
    
    /**
     * Show loading state
     */
    function showLoading(show) {
      const loadingEl = document.getElementById('loading-state');
      if (show) {
        loadingEl.style.display = 'block';
      } else {
        loadingEl.style.display = 'none';
      }
    }
    
    /**
     * Show error message
     */
    function showError(message) {
      const container = document.getElementById('error-container');
      container.innerHTML = `
        <div class="error-message">
          <strong>⚠️ Ralat:</strong> ${message}
          <button onclick="loadData()" style="margin-left: 12px; padding: 4px 12px; background: #ef4444; color: white; border: none; border-radius: 4px; cursor: pointer;">
            🔄 Cuba Lagi
          </button>
        </div>
      `;
    }
    
    /**
     * Hide error message
     */
    function hideError() {
      document.getElementById('error-container').innerHTML = '';
    }
    
    /**
     * Initialize - Load data on page load
     */
    document.addEventListener('DOMContentLoaded', function() {
      loadData();
      
      // Auto-refresh every 30 seconds
      setInterval(loadData, 30000);
    });
    
    /**
     * Manual refresh button (can add to header if needed)
     */
    function refreshData() {
      loadData();
    }

    // Login routing function
    function loginAs(role) {
      console.log('loginAs called with role:', role);
      window.location.href = '?page=login&role=' + role;
    }

}
  </script>
  
</body>
</html>
