<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sukan Tahunan - Home</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
    .header { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); padding: 20px; border-radius: 12px; margin-bottom: 30px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .btn { padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; transition: all 0.3s; display: inline-flex; align-items: center; justify-content: center; text-decoration: none; }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-primary:hover { background: #2563eb; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4); }
    .skeleton { background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%); background-size: 200% 100%; animation: loading 1.5s infinite; border-radius: 4px; }
    @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 style="font-size: 32px; font-weight: bold; color: #1f2937; margin-bottom: 8px;">
        🏆 <span id="tournament-name">Memuatkan...</span>
      </h1>
      <p style="color: #6b7280; font-size: 16px;">Sistem Pengurusan Sukan Tahunan</p>
      <div style="margin-top: 16px;">
       <!-- Disembunyikan seketika sehingga URL dibina -->
       <a href="#" id="login-link" target="_top" class="btn btn-primary" style="display: none;">
         🔐 Log Masuk Petugas
       </a>
      </div>
    </div>
    
    <div id="error-container"></div>
    <div id="loading-state" style="display: none;">
      <div class="card"><div class="skeleton" style="height: 40px; width: 60%; margin-bottom: 16px;"></div></div>
    </div>

    <!-- Paparan Maklumat Awam -->
    <div class="card">
      <h2 style="font-size: 24px; font-weight: bold; color: #1f2937; margin-bottom: 20px;">🏅 Kedudukan Rumah</h2>
      <div id="medal-tally">
        <p style="color: #6b7280;">Sila tunggu, sedang mendapatkan data terkini...</p>
      </div>
    </div>
  </div>
  
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      loadData();
      prepareLoginLink();
    });

    function loadData() {
      document.getElementById('loading-state').style.display = 'block';
      if (typeof google === 'undefined') {
        document.getElementById('loading-state').style.display = 'none';
        document.getElementById('tournament-name').textContent = "Sistem Sukan Tempatan";
        document.getElementById('login-link').href = '?page=login';
        document.getElementById('login-link').style.display = 'inline-flex';
        return;
      }

      google.script.run
        .withSuccessHandler(function(res) {
          document.getElementById('loading-state').style.display = 'none';
          if(res && res.data && res.data.tournament) {
            document.getElementById('tournament-name').textContent = res.data.tournament.name;
          }
        })
        .withFailureHandler(function(err) {
          document.getElementById('loading-state').style.display = 'none';
          document.getElementById('error-container').innerHTML = '<div style="background:#fee2e2; color:#991b1b; padding:16px; border-radius:8px;">Ralat memuatkan data.</div>';
        })
        .getPublicData({ type: 'home' });
    }

    // TEKNIK NAVIGASI SELAMAT (Sandbox Bypass)
    // Bina elemen <a> sebenar yang apabila diklik akan selamat menavigasi tetingkap (_top)
    function prepareLoginLink() {
      if (typeof google !== 'undefined' && google.script) {
        google.script.run
          .withSuccessHandler(function(url) {
            const loginLink = document.getElementById('login-link');
            loginLink.href = url + '?page=login';
            loginLink.style.display = 'inline-flex';
          })
          .getScriptUrl();
      }
    }
  </script>
</body>
</html>
