<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sukan Tahunan Sekolah</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
    .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 20px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); padding: 40px; width: 90%; max-width: 800px; text-align: center; }
    .portal-btn { transition: all 0.3s ease; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 16px; border-radius: 16px; border: 2px solid transparent; cursor: pointer; background: #f8fafc; }
    .portal-btn:hover { transform: translateY(-5px); box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.3); border-color: #3b82f6; background: #eff6ff; }
    .icon-large { font-size: 48px; margin-bottom: 12px; }
  </style>
</head>
<body>

  <div class="glass-card">
    <div style="margin-bottom: 40px;">
      <h1 class="text-4xl font-extrabold text-gray-900 mb-2">🏆 Sistem Sukan Sekolah</h1>
      <p class="text-gray-500 text-lg">Sila pilih portal log masuk mengikut peranan anda di bawah.</p>
    </div>

    <!-- PENYELESAIAN 2: 4 Butang Portal -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
      
      <div class="portal-btn" onclick="forceRedirect('?page=login&role=admin')">
        <span class="icon-large">⚙️</span>
        <span class="font-bold text-gray-800 text-lg">Admin</span>
        <span class="text-xs text-gray-500 mt-1">Pengurusan Sistem</span>
      </div>

      <div class="portal-btn" onclick="forceRedirect('?page=login&role=guru_rumah')">
        <span class="icon-large">🏠</span>
        <span class="font-bold text-gray-800 text-lg">Guru Rumah</span>
        <span class="text-xs text-gray-500 mt-1">Urus Atlet & Rumah</span>
      </div>

      <div class="portal-btn" onclick="forceRedirect('?page=login&role=pengurus')">
        <span class="icon-large">📋</span>
        <span class="font-bold text-gray-800 text-lg">Pengurus</span>
        <span class="text-xs text-gray-500 mt-1">Semakan & Laporan</span>
      </div>

      <div class="portal-btn" onclick="forceRedirect('?page=login&role=pencatat')">
        <span class="icon-large">⏱️</span>
        <span class="font-bold text-gray-800 text-lg">Pencatat</span>
        <span class="text-xs text-gray-500 mt-1">Keputusan Padang</span>
      </div>

    </div>
  </div>

  <script>
    // PENYELESAIAN 1: BYPASS SANDBOX SECURITY ERROR
    // Hasilkan elemen <a> secara dinamik dan sasarkan '_top'
    function forceRedirect(params = '') {
      if (typeof google !== 'undefined' && google.script) {
        // Paparkan status loading
        document.body.style.opacity = '0.5';
        
        google.script.run.withSuccessHandler(function(baseUrl) {
          const link = document.createElement('a');
          link.href = baseUrl + params;
          link.target = '_top'; // Wajib untuk bypass iframe Google
          document.body.appendChild(link);
          link.click();
        }).withFailureHandler(function(err) {
          alert("Ralat memuatkan URL: " + err.message);
          document.body.style.opacity = '1';
        }).getScriptUrl();
      } else {
        // Fallback untuk local testing
        window.location.href = params;
      }
    }
  </script>

</body>
</html>
